<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        :root {
            --bg: #f4efe8;
            --panel: rgba(255, 251, 246, 0.88);
            --ink: #171717;
            --muted: #6b655e;
            --accent: #c24f32;
            --accent-dark: #8f301a;
            --border: rgba(23, 23, 23, 0.12);
            --shadow: 0 24px 70px rgba(37, 24, 12, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(194, 79, 50, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(35, 90, 77, 0.14), transparent 24%),
                linear-gradient(145deg, #f7f1e7, #efe6db 55%, #ece2d9);
        }

        .card {
            width: min(100%, 440px);
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 12px;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1;
        }

        p {
            margin: 0 0 22px;
            color: var(--muted);
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            margin-bottom: 18px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font: inherit;
            background: rgba(255, 255, 255, 0.88);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            font-weight: 700;
            color: #fff8f4;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 0.92rem;
        }

        .error {
            color: #7b2014;
            background: rgba(194, 79, 50, 0.12);
        }

        .success {
            color: #21584e;
            background: rgba(33, 88, 78, 0.12);
        }

        .note {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Newsroom Admin</h1>
    <p>Sign in to manage articles in the admin workspace. API clients can also authenticate with HTTP Basic.</p>

    <div class="message error" th:if="${param.error}">
        Invalid username or password.
    </div>
    <div class="message success" th:if="${param.logout}">
        You have been signed out.
    </div>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="admin" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required>

        <button type="submit">Login</button>
    </form>

    <div class="note">
        Default admin credentials: <strong>admin / admin123</strong><br>
        Public API credentials: <strong>public / public123</strong>
    </div>
</main>
</body>
</html>
