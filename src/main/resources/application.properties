spring.application.name=news-management
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100

server.error.include-message=always

logging.level.com.example.demo=${APP_LOG_LEVEL:INFO}

app.security.admin.username=${ADMIN_USERNAME}
app.security.admin.password=${ADMIN_PASSWORD}
app.security.public-user.username=${PUBLIC_USERNAME}
app.security.public-user.password=${PUBLIC_PASSWORD}
